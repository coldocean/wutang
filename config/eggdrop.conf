# WU-tang — Eggdrop configuration for the Wunderbar IRC network.
#
# Values wrapped in __ENV__ style or referencing env() are filled in at boot
# by docker-entrypoint.sh from Railway environment variables. Do NOT hardcode
# secrets here; set them as Railway service variables.
#
# Reference: https://docs.eggheads.org/

############# BASIC SETTINGS #############

# The bot's handle on its own partyline / among linked bots.
set botnet-nick "WU-tang"

# Admin / owner contact info (shown in some replies).
set admin "deemah & funt <admin@wunderbar.lv>"

# Network name (cosmetic, used by some scripts).
set network "Wunderbar"

# Timezone.
set timezone "UTC"
set offset "0"

# Where the bot keeps its files (persisted via Railway volume at /opt/eggdrop/data).
set userfile "data/WU-tang.user"
set chanfile "data/WU-tang.chan"
set pidfile "data/WU-tang.pid"

# Don't die when the userfile is missing on first boot.
set die-on-sighup 0
set die-on-sigterm 1

# Run in the foreground (Docker manages the process). 0 = foreground.
set background 0

# Console log level for the foreground output.
set console "mco"

# Logging — files go to logs/ (also persisted).
logfile mco * "logs/WU-tang.log"
logfile jpk "#lobby" "logs/lobby.log"
logfile jpk "#help" "logs/help.log"
logfile jpk "#wunderbar" "logs/wunderbar.log"
set keep-all-logs 0
set max-logsize 0
set quick-logs 0

# Switch logfiles at midnight.
set switch-logfiles-at 300

############# IDENTITY ON IRC #############

# The nick the bot uses on IRC. Realname/ident below.
set nick "WU-tang"
set altnick "WU-t4ng"
set realname "Wunderbar guardian bot (WU-tang)"
set username "wutang"

# What the bot does when it joins / on connect (raw IRC handled by scripts).

############# SERVER LIST #############

# Reconnect behaviour.
set servers-quit-msg "Wunderbar — be excellent to each other."
set default-port 52947
set keep-nick 1
set quiet-reject 1
set strict-servernames 0
set connect-timeout 30
set resolve-timeout 15

# The Wunderbar uplink. Host/port injected from env at boot (IRC_SERVER /
# IRC_PORT). Placeholder below is rewritten by the entrypoint.
set servers {
  __IRC_SERVER__:__IRC_PORT__
}

############# MODULES #############

set mod-path "/opt/eggdrop/modules/"

# Core modules shipped with Eggdrop 1.9.x.
loadmodule dns
loadmodule channels
loadmodule server
loadmodule ctcp
loadmodule irc
loadmodule notes
loadmodule console
loadmodule blowfish
loadmodule uptime
loadmodule assoc
loadmodule wire
loadmodule transfer
loadmodule share
loadmodule compress
loadmodule filesys
# NOTE: there is no built-in "seen" module — !seen is implemented in
# scripts/stats.tcl using the bot's own tracking, so no module needed.

############# CHANNELS MODULE SETTINGS #############

set chanfile "data/WU-tang.chan"
set default-flood-chan "10:60"
set default-flood-deop "3:10"
set default-flood-kick "3:10"
set default-flood-join "5:60"
set default-flood-ctcp "3:60"
set default-flood-nick "5:60"
set default-aop-delay "5:30"
set default-idle-kick 0
set default-chanmode "nt"
set default-stopnethack-mode 0
set default-revenge-mode 0
set default-ban-type 3
set default-ban-time 120
set default-exempt-time 60
set default-invite-time 60

set global-flood-chan "10:60"
set global-flood-deop "3:10"
set global-flood-kick "3:10"
set global-flood-join "5:60"
set global-flood-ctcp "3:60"
set global-flood-nick "5:60"
set global-chanset {
        -autoop         -autovoice
        -bitch          +cycle
        +dontkickops    +dynamicbans
        +dynamicexempts +dynamicinvites
        -enforcebans    +greet
        -inactive       -nodesynch
        -protectfriends +protectops
        -revenge        -revengebot
        -secret         -seen
        +shared         +statuslog
        +userexempts    +userbans
        +userinvites    -protecthalfops
        -autohalfop     -static
}
set ban-time 120
set exempt-time 60
set invite-time 60
set force-expire 0
set share-greet 0
set use-info 1

############# SERVER MODULE SETTINGS #############

set msg-rate 2
set keep-nick 1
set use-penalties 1
set use-console-r 0
set debug-output 0
set serverror-quit 1
set max-queue-msg 300
set trigger-on-ignore 0
set exclusive-binds 0
set double-mode 1
set double-server 1
set double-help 1
set optimize-kicks 1
set stack-limit 4

# CTCP handled by ctcp.mod.
set ctcp-mode 0

# Some networks use these; harmless on ngIRCd.
set net-type "Other"

############# IRC MODULE SETTINGS #############

set learn-users 0
set wait-split 300
set wait-info 180
set mode-buf-length 200
set use-354 0
set kick-method 1
set modes-per-line 3
set include-lk 1
set use-exempts 1
set use-invites 1
set prevent-mixing 1
set rfc-compliant 1

############# CTCP MODULE SETTINGS #############

set ctcp-version 1
set ctcp-clientinfo 1
set ctcp-userinfo 1
set ctcp-finger 1

############# DCC / PARTYLINE #############

# Telnet/DCC listen port for the partyline. Railway injects $PORT but the bot
# is an OUTBOUND client and does not need a public port; we still open a local
# listen so owners can DCC chat. Entrypoint sets this to $PORT if provided.
listen __DCC_PORT__ all

set protect-telnet 1
set dcc-sanitycheck 0
set ident-timeout 5
set require-p 0
set open-telnets 0
set stealth-telnets 0
set use-telnet-banner 1
set connect-timeout 30
set dcc-flood-thr 3
set telnet-flood 5:60
set resolve-timeout 15

############# NOTES MODULE #############

set max-notes 50
set note-life 60
set allow-fwd 0
set notify-users 1
set notify-onjoin 1

############# CONSOLE MODULE #############

set console "mkcoblsd"
set info-party 0

############# OWNERS #############

# Permanent owners (full +n). Handle names — the people identify with
# `/msg WU-tang pass <password>` after `hello`, or the entrypoint can
# seed them. deemah + funt.
set owner "deemah,funt"

# Users who can use the .die etc. Keep equal to owner here.
set must-be-owner 1

############# MISC #############

set ignore-time 15
set hourly-updates 00
set notify "deemah"
set whois-fields ""
set my-ip ""
# Public IP advertised in DCC handshakes (the Railway TCP proxy address).
# Entrypoint resolves DCC_HOST -> IP and fills this in.
set nat-ip "__NAT_IP__"

# Don't share user/ban lists with bots we aren't linked to.
set allow-dk-cmds 1
set userfile-perm 0600

############# SCRIPTS #############

# Eggdrop's stock helper scripts (shipped in scripts/).
source scripts/alltools.tcl

# Custom Wunderbar scripts (copied into scripts/wunderbar/ by the Dockerfile).
source scripts/wunderbar/action.fix.tcl
source scripts/wunderbar/wunderbar.tcl
source scripts/wunderbar/antispam.tcl
source scripts/wunderbar/stats.tcl
source scripts/wunderbar/help.tcl
source scripts/wunderbar/admin.tcl
source scripts/wunderbar/console.tcl
source scripts/wunderbar/oppact.tcl
source scripts/wunderbar/radiopromo.tcl

# Eggdrop reads the bot's own help here.
set telnet-banner "telnet-banner.txt"
set whois-fields ""

# Hand the loaded channels' settings (added below by entrypoint via .chan
# file on first run; we also +chan here as a fallback in wunderbar.tcl).

putlog "WU-tang config loaded for the Wunderbar network."
